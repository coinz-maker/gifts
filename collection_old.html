<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT коллекция</title>
    <style>
        /* Стили из предыдущей версии (копируем сюда) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-button:hover {
            background: #5a67d8;
            transform: translateX(-5px);
        }
        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-weight: 600;
            color: #555;
        }
        select, button {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        select:hover, button:hover { border-color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            font-weight: 600;
        }
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .stats {
            background: #e8f4fd;
            padding: 10px 20px;
            border-radius: 8px;
            margin-left: auto;
            font-weight: 600;
            color: #2c3e50;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .nft-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #eee;
        }
        .nft-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
        }
        .nft-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
        }
        .nft-info { padding: 12px; }
        .nft-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nft-attributes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .attribute-tag {
            background: #f0f2f5;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            color: #555;
            border: 1px solid #e0e0e0;
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }
        .modal-image { width: 100%; border-radius: 12px; margin-bottom: 20px; }
        .modal-attributes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .modal-attribute {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        .modal-attribute .trait {
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
        }
        .modal-attribute .value {
            font-size: 14px;
            color: #333;
            margin-top: 5px;
        }
        .reset-btn { background: #e53e3e; }
        .reset-btn:hover { background: #c53030; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #667eea; }
        .error { text-align: center; padding: 50px; font-size: 18px; color: #e53e3e; }
        .last-updated { text-align: right; color: #666; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← Назад к списку коллекций</a>
        <h1 id="collection-title">Загрузка коллекции...</h1>
        
        <div class="filters">
            <div class="filter-group">
                <label for="sort-by">Сортировать по:</label>
                <select id="sort-by">
                    <option value="name">Имени</option>
                    <option value="index">Индексу</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="sort-dir">Порядок:</label>
                <select id="sort-dir">
                    <option value="asc">А-Я / 0-9</option>
                    <option value="desc">Я-А / 9-0</option>
                </select>
            </div>
            
            <button onclick="applyFilters()">Применить</button>
            <button class="reset-btn" onclick="resetFilters()">Сбросить</button>
            
            <div class="stats" id="stats">Загрузка...</div>
        </div>

        <div class="nft-grid" id="nft-grid">
            <div class="loading">⏳ Загрузка NFT...</div>
        </div>
        <div class="last-updated" id="last-updated"></div>
    </div>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const walletAddress = urlParams.get('wallet');
        const collectionAddress = urlParams.get('collection');

        let allNfts = [];
        let currentNfts = [];

        async function fetchCollectionNfts() {
            if (!walletAddress || !collectionAddress) {
                document.getElementById('nft-grid').innerHTML = '<div class="error">❌ Не указан кошелек или коллекция</div>';
                return;
            }

            try {
                document.getElementById('nft-grid').innerHTML = '<div class="loading">⏳ Загрузка данных...</div>';
                
                const response = await fetch(`/.netlify/functions/get-collection-nfts?wallet=${encodeURIComponent(walletAddress)}&collection=${encodeURIComponent(collectionAddress)}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка! статус: ${response.status}`);
                }

                const data = await response.json();
                
                allNfts = data.nft_items || [];
                currentNfts = [...allNfts];
                
                // Обновляем название коллекции
                if (allNfts.length > 0 && allNfts[0].collection) {
                    document.getElementById('collection-title').textContent = allNfts[0].collection.name;
                }
                
                populateFilters();
                renderNfts();

                const now = new Date();
                document.getElementById('last-updated').textContent = `Обновлено: ${now.toLocaleString()}`;

            } catch (err) {
                console.error('Ошибка:', err);
                document.getElementById('nft-grid').innerHTML = `<div class="error">❌ Ошибка загрузки: ${err.message}</div>`;
            }
        }

        function getImageUrl(nft) {
            const preview = nft.previews?.find(p => p.resolution === "100x100");
            if (preview?.url) return preview.url;
            if (nft.metadata?.image) return nft.metadata.image;
            return 'https://via.placeholder.com/200?text=No+Image';
        }

        function extractAttributes(nft) {
            const attrs = {};
            if (nft.metadata?.attributes) {
                nft.metadata.attributes.forEach(attr => {
                    if (attr.trait_type && attr.value) {
                        attrs[attr.trait_type] = attr.value;
                    }
                });
            }
            return attrs;
        }

        function populateFilters() {
            const filters = ['Model', 'Backdrop', 'Symbol'];
            filters.forEach(filterType => {
                const values = new Set();
                allNfts.forEach(nft => {
                    const attrs = extractAttributes(nft);
                    if (attrs[filterType]) values.add(attrs[filterType]);
                });
                
                const select = document.getElementById(`filter-${filterType.toLowerCase()}`);
                if (select) {
                    select.innerHTML = `<option value="all">Все ${filterType}</option>`;
                    [...values].sort().forEach(value => {
                        const option = document.createElement('option');
                        option.value = value;
                        option.textContent = value;
                        select.appendChild(option);
                    });
                }
            });
        }

        function sortNfts(nfts, sortBy, sortDir) {
            const dir = sortDir === 'desc' ? -1 : 1;
            return [...nfts].sort((a, b) => {
                if (sortBy === 'name') {
                    return dir * (a.metadata?.name || '').localeCompare(b.metadata?.name || '');
                } else if (sortBy === 'index') {
                    const indexA = parseFloat(a.index) || 0;
                    const indexB = parseFloat(b.index) || 0;
                    return dir * (indexA - indexB);
                }
                return 0;
            });
        }

        function filterNfts() {
            return allNfts; // Пока без фильтров для простоты
        }

        function renderNfts() {
            const sortBy = document.getElementById('sort-by').value;
            const sortDir = document.getElementById('sort-dir').value;
            let filteredNfts = filterNfts();
            filteredNfts = sortNfts(filteredNfts, sortBy, sortDir);
            
            const grid = document.getElementById('nft-grid');
            const stats = document.getElementById('stats');
            
            stats.textContent = `Показано: ${filteredNfts.length} из ${allNfts.length}`;
            
            if (filteredNfts.length === 0) {
                grid.innerHTML = '<div class="no-data">Нет NFT</div>';
                return;
            }
            
            grid.innerHTML = filteredNfts.map(nft => {
                const attrs = extractAttributes(nft);
                const imageUrl = getImageUrl(nft);
                
                return `
                    <div class="nft-card" onclick='showModal(${JSON.stringify(nft).replace(/'/g, "&apos;")})'>
                        <img class="nft-image" src="${imageUrl}" alt="${nft.metadata?.name || 'NFT'}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=Error'">
                        <div class="nft-info">
                            <div class="nft-name">${nft.metadata?.name || 'Без имени'}</div>
                            <div class="nft-attributes">
                                ${Object.entries(attrs).map(([key, value]) => 
                                    `<span class="attribute-tag">${key}: ${value}</span>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showModal(nft) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            const attrs = extractAttributes(nft);
            const imageUrl = getImageUrl(nft);
            
            const shortAddress = nft.address ? 
                nft.address.substring(0, 6) + '...' + nft.address.substring(nft.address.length - 4) : 
                'Неизвестно';
            
            modalContent.innerHTML = `
                <img class="modal-image" src="${imageUrl}" alt="${nft.metadata?.name || 'NFT'}" onerror="this.src='https://via.placeholder.com/500?text=Error'">
                <h2>${nft.metadata?.name || 'Без имени'}</h2>
                <p><strong>Адрес:</strong> ${shortAddress}</p>
                <p><strong>Коллекция:</strong> ${nft.collection?.name || 'Без коллекции'}</p>
                <div class="modal-attributes">
                    ${Object.entries(attrs).map(([key, value]) => `
                        <div class="modal-attribute">
                            <div class="trait">${key}</div>
                            <div class="value">${value}</div>
                        </div>
                    `).join('')}
                </div>
                ${nft.metadata?.description ? `<p><small>${nft.metadata.description}</small></p>` : ''}
            `;
            
            modal.style.display = 'flex';
        }

        function closeModal(event) {
            const modal = document.getElementById('modal');
            if (!event || event.target === modal) {
                modal.style.display = 'none';
            }
        }

        function applyFilters() { renderNfts(); }
        function resetFilters() {
            document.getElementById('sort-by').value = 'name';
            document.getElementById('sort-dir').value = 'asc';
            renderNfts();
        }

        // Загружаем NFT при загрузке страницы
        window.addEventListener('load', fetchCollectionNfts);
    </script>
</body>
</html>
